<!DOCTYPE html>
<html>
<head>
	<title>My Website</title>
	<style>
		body {
			margin: 0;
			padding: 0;
			background-color: #f2f2f2;
		}
		.container {
			max-width: 100%;
			margin: 0 auto;
			display: flex;
			flex-wrap: wrap;
		}
		.item {
			flex: 1 0 25%;
			margin: 5px;
			position: relative;
			cursor: pointer;
		}
		.item img {
			width: 100%;
			height: auto;
			display: block;
		}
		.item .overlay {
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			background-color: rgba(0, 0, 0, 0.5);
			color: #fff;
			display: flex;
			align-items: center;
			justify-content: center;
			opacity: 0;
			transition: opacity 0.3s ease-in-out;
		}
		.item:hover .overlay {
			opacity: 1;
		}
		.item .overlay p {
			margin: 0;
			font-size: 1.2rem;
			text-align: center;
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="item">
			<img src="../imagery/trial.png">
			<div class="overlay">
				<p>a trial</p>
			</div>
		 </div>
		<div class="item">
			<img src="../imagery/trial.png">
			<div class="overlay">
				<p>Image 2 description</p>
			</div>
		</div>
		<div class="item">
			<img src="../imagery/trial.png">
			<div class="overlay">
				<p>Image 3 description</p>
			</div>
		</div>
		<div class="item">
			<img src="../imagery/trial.png">
			<div class="overlay">
				<p>Image 4 description</p>
			</div>
		</div>
	</div>
</body>
</html>
